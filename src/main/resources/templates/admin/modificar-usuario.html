<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>
  	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

	<script src="https://code.jquery.com/jquery-3.7.1.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
	<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="container mt-5">

    <div class="flex-grow-1 p-4 w-100">
        <div class="container" style="max-width: 900px;"> <div class="mb-4">
                <h2 class="mb-0">Editar Usuario</h2>
            </div>

            <div class="card card-admin p-4 shadow-lg">
                <form action="#" method="post">
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white">ID Cliente (DNI/Código)</label>
                            <input type="text" class="form-control" name="idCliente" value="78451236" readonly>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white">Estado de la Cuenta</label>
                            <select class="form-select text-white" name="estado">
                                <option value="1" selected>Activo</option>
                                <option value="0">Bloqueado / Inactivo</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white">Nombres</label>
                            <input type="text" class="form-control" name="nombres" value="Marco Antonio" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white">Apellidos</label>
                            <input type="text" class="form-control" name="apellidos" value="Gonzales" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white">DNI</label>
                            <input type="text" class="form-control" name="dni" value="45258695" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white">Teléfono</label>
                            <input type="text" class="form-control" name="telefono" value="999888777" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label text-white">Correo Electrónico</label>
                            <input type="email" class="form-control" name="correo" value="marco.g@gmail.com" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white">Sexo</label>
                            <select class="form-select text-white" name="sexo">
                                <option value="M" selected>Masculino</option>
                                <option value="F">Femenino</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-4">
                        <div class="col-md-6">
                            <label class="form-label text-white">Fecha de Nacimiento</label>
                            <input type="date" class="form-control" name="fechaNacimiento" value="1998-05-14" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-white">Dirección</label>
                            <input type="text" class="form-control" name="direccion" value="Av. Los Olivos 123" required>
                        </div>
                    </div>

                    <hr class="border-secondary mb-4">

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/admin/lista-usuarios}" class="btn btn-outline-light me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Guardar Cambios</button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</div>

</body>
</html>
