<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Juegos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	
	<link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="container mt-5">
	<div class="d-flex justify-content-between align-items-center mb-4">
	    <h2 class="mb-0">Gestión de Juegos</h2>
	    <a th:href="@{/admin/registrar}" class="btn btn-success px-4 py-2">Nuevo Juego</a>
	</div>

    <div class="card card-admin p-4">
        <table class="table table-hover align-middle">
            <thead class="table-dark">
                <tr>
                    <th>Imagen</th>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th class="text-center">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="juego : ${lstJuegos}">
                    <td>
                        <img th:src="@{'/uploads/ImgJuegos/' + ${juego.imagen}}" 
                             style="width: 50px; height: 50px; object-fit: cover; border-radius: 5px;">
                    </td>
                    <td th:text="${juego.idJuegos}">1</td>
                    <td th:text="${juego.descripcion}">Nombre</td>
                    <td th:text="${juego.categoria.descripcion}">Accion</td>
                    <td th:text="'S/. ' + ${#numbers.formatDecimal(juego.precio, 1, 2)}">0.00</td>
                    <td class="text-center">
						<a th:href="@{'/admin/modificar/' + ${juego.idJuegos}}" class="btn btn-sm btn-primary">Editar</a>                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
