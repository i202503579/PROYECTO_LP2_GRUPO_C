<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Mis Compras - MundoGamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/2.3.2/css/dataTables.bootstrap5.css">
    
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.js"></script>
    <script src="https://cdn.datatables.net/2.3.2/js/dataTables.bootstrap5.js"></script>
    
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/dataTable.css}">
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body style="background-color: rgb(69, 69, 155);">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-uppercase fw-bold m-0"><i class="bi bi-bag-heart-fill texto-acento"></i> Mis Compras</h2>
            <a th:href="@{/producto/inicio}" class="btn btn-cancelar px-4 py-2" style="max-width: 200px; text-decoration: none;">
                <i class="bi bi-house-door-fill me-2"></i>Ir al Inicio
            </a>
        </div>
        
        <div class="card card-admin p-4 shadow-lg">
            <table id="tbl-mis-compras" class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Código de Orden</th>
                        <th>Fecha de Compra</th>
                        <th class="text-end">Total Pagado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="v : ${lstVentas}">
                        <td th:text="${v.idVenta}"></td>
                        <td th:text="${#temporals.format(v.fechaVenta, 'dd/MM/yyyy HH:mm:ss')}"></td>
                        <td class="text-end fw-bold texto-acento" th:text="'S/. ' + ${#numbers.formatDecimal(v.montoTotal, 1, 2)}"></td>
                        <td class="text-center">
                            <a th:href="@{/compras/detalle-compra/{id}(id=${v.idVenta})}" class="btn btn-sm btn-info text-white me-2">
                                <i class="bi bi-eye-fill"></i> Ver Detalles
                            </a>
                            <a th:href="@{/admin/boleta(numBol=${v.idVenta})}" target="_blank" class="btn btn-sm btn-danger">
                                <i class="bi bi-file-pdf"></i> PDF
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        $(document).ready(function () {
            $('#tbl-mis-compras').DataTable({
                language: {
                    "search": "Buscar Compra:",
                    "lengthMenu": "Mostrar _MENU_ registros",
                    "info": "Mostrando _END_ compras de _TOTAL_",
                    "zeroRecords": "Aún no has realizado ninguna compra en la tienda"
                },
                pageLength: 5,
                ordering: true
            });
        });
    </script>
</body>
</html>
