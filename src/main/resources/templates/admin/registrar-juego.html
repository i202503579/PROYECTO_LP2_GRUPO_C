<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Juego - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="container mt-5">
        <div class="card card-admin p-4 shadow-lg">
            <h1 class="text-center text-white mb-4">Registrar Nuevo Juego</h1>
            <div class="row d-flex justify-content-center">
                <div class="col-md-8">
                    <form class="row g-3" th:action="@{/admin/registrar-juego}" th:object="${juego}" method="post" enctype="multipart/form-data">
                        
                        <div class="col-md-12">
                            <label class="form-label text-white">Nombre del Juego</label>
                            <input type="text" class="form-control" th:field="*{descripcion}" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white">Categoría</label>
                            <select class="form-select" th:field="*{categoria.idCategoria}" required>
                                <option value="">--Seleccione--</option>
                                <option th:each="cat : ${categorias}" 
                                        th:value="${cat.idCategoria}" 
                                        th:text="${cat.descripcion}"></option>
                            </select>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label text-white">Precio</label>
                            <div class="input-group">
                                <span class="input-group-text bg-dark text-white border-0">S/.</span>
                                <input type="number" class="form-control" step="0.01" th:field="*{precio}" required>
                            </div>
                        </div>

						<div class="col-md-12">
						        <label class="form-label text-white">Imagen del Juego</label>
						        <input type="file" name="file" class="form-control" accept="image/*" required>
						</div>

                        <div class="col-md-12 d-flex justify-content-between mt-4">
                            <a th:href="@{/admin/lista-juegos}" class="btn btn-outline-light">
                                <i class="fa-solid fa-reply"></i> Regresar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fa-solid fa-floppy-disk"></i> Registrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <th:block th:utext="${Alert}"></th:block>
</body>
</html>
