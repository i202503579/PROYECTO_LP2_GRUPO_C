<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contáctanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/header.css}"> 
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/contacto.css}">
</head>
<body style="background-color: rgb(69, 69, 155);">
    
    <div th:replace="~{fragments/header :: menuPrincipal}"></div>

    <section>
        <div class="contenedor">
            <div class="marcoContacto">
                <h1 class="main-title text-center">Contáctanos</h1>

                <div th:if="${mensajeExito != null}" class="alert alert-success text-center" role="alert">
                    <h4 class="alert-heading">¡Mensaje Recibido! 👋</h4>
                    <p>Su consulta ha sido registrada con éxito</p>
                </div>
                
                <div th:if="${mensajeError != null}" class="alert alert-danger text-center" role="alert">
                    <h4 class="alert-heading">¡Error al Enviar! 🙁</h4>
                    <p>No se pudo registrar su mensaje. Por favor, intente de nuevo.</p>
                </div>
                
                <form class="formulario" id="form-contacto" th:action="@{/contactanos}" method="post">
                    
                    <div class="row mb-3 align-items-center">
                        <div class="col-3">
                            <label for="nombre" class="col-form-label text-end">Nombre</label>
                        </div>
                        <div class="col-9">
                            <input type="text" id="nombre" name="txtnom" class="form-control" placeholder="Ingresa tu nombre" required>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <div class="col-3">
                            <label for="email" class="col-form-label text-end">Correo</label>
                        </div>
                        <div class="col-9">
                            <input type="email" id="email" name="txtemail" class="form-control" placeholder="Ingresa tu email" required>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <div class="col-3">
                            <label for="telefono" class="col-form-label text-end">Teléfono</label>
                        </div>
                        <div class="col-9">
                            <input type="text" id="telefono" name="txttel" class="form-control" placeholder="Ingresa tu teléfono" required>
                        </div>
                    </div>

                    <div class="row mb-3 align-items-start">
                        <div class="col-3">
                            <label for="mensaje" class="col-form-label text-end">Mensaje</label>
                        </div>
                        <div class="col-9">
                            <textarea id="mensaje" name="txtmens" class="form-control" rows="3"
                                placeholder="Ingrese el mensaje&#10;Máximo 200 caracteres" maxlength="200" required></textarea>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button class="btn enviar" type="submit">Enviar</button>
                    </div>
                </form>
            </div>
        </div>   
    </section>
    
    <div th:replace="~{fragments/footer :: pieDePagina}"></div>
    
</body>
</html>
