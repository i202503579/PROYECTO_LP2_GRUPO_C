<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalle de Compra - MundoGamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/carrito.css}">
    <link rel="stylesheet" th:href="@{/css/dataTable.css}">
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-9">
                
                <div class="card card-admin p-5 shadow-lg">
                    
                    <div class="text-center mb-5">
                        <h2 class="fw-bold text-uppercase"> Detalle de la Compra </h2>
                        <p class="text-white-50 small mb-0">MundoGamer - Comprobante de Venta</p>
                    </div>
                    
					<div class="table-responsive">
					    <table class="table align-middle text-white m-0" style="--bs-table-bg: transparent !important; background-color: transparent !important;">
					        <thead>
					            <tr>
					                <th class="py-3 ps-3 text-white border-0">Juego</th>
					                <th class="py-3 text-center text-white border-0">Cantidad</th>
					                <th class="py-3 text-end text-white border-0">Precio Unitario</th>
					                <th class="py-3 pe-3 text-end text-white border-0">Subtotal</th>
					            </tr>
					        </thead>
					        <tbody>
					            <tr th:each="d : ${detalles}" style="--bs-table-bg: transparent !important; background-color: transparent !important; border-bottom: 1px solid rgba(255, 255, 255, 0.1) !important;">
					                <td class="py-3 ps-3 text-white border-0" th:text="${d.juego.descripcion}"></td>
					                <td class="py-3 text-center text-white border-0" th:text="${d.cantidad}"></td>
					                <td class="py-3 text-end text-white border-0" th:text="'S/. ' + ${#numbers.formatDecimal(d.precio, 1, 2)}"></td>
					                <td class="py-3 pe-3 text-end border-0 fw-bold text-white" th:text="'S/. ' + ${#numbers.formatDecimal(d.precio * d.cantidad, 1, 2)}"></td>
					            </tr>
					        </tbody>
					        
					        <tfoot>
					            <tr style="--bs-table-bg: transparent !important; background-color: transparent !important;">
					                <td colspan="2" class="border-0"></td>
					                <td class="pt-4 text-end fs-5 fw-bold text-white border-0">Total General:</td>
					                <td class="pt-4 pe-3 text-end fs-4 fw-bold text-white border-0">
					                    S/. <span th:text="${#numbers.formatDecimal(#aggregates.sum(detalles.![precio * cantidad]), 1, 2)}"></span>
					                </td>
					            </tr>
					        </tfoot>
					    </table>
					</div>
                    
					<div class="mt-5 d-flex justify-content-between align-items-center">
					    <a th:href="@{/compras/historial}" class="btn btn-cancelar px-4 py-2 m-0" style="max-width: 180px; text-decoration: none;">
					        <i class="bi bi-arrow-left me-2"></i>Volver
					    </a>
					    
					    <a th:if="${not #lists.isEmpty(detalles)}" 
					       th:href="@{/admin/boleta(numBol=${detalles[0].venta.idVenta})}" 
					       target="_blank" 
					       class="btn btn-success px-4 py-2 border-0 fw-bold btn-tema">
					        <i class="bi bi-printer-fill me-2"></i> Imprimir PDF
					    </a>
					</div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
