<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalles del Juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/verprod.css}">
    <style>
        .card-detalle { background-color: rgba(0,0,0,0.3); border: 1px solid rgb(242, 64, 93); color: white; }
        .img-juego { width: 100%; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body style="background-color: rgb(69, 69, 155);">

<div class="container mt-5">
    <div class="d-flex mb-4">
        <a th:href="@{/producto/juegos}" class="btn btn-warning me-2">← Volver al catálogo</a>
    </div>

    <div class="card card-detalle p-4">
        <div class="row g-4">
            <div class="col-md-4 text-center">
                <img th:src="@{'/uploads/ImgJuegos/' + ${juego.imagen}}" class="img-juego">
            </div>

            <div class="col-md-8">
                <h2 class="mb-3" th:text="${juego.descripcion}">Nombre del Juego</h2>
                <p><strong>ID:</strong> <span th:text="${juego.idJuegos}">0</span></p>
                <p><strong>Precio:</strong> S/. <span th:text="${#numbers.formatDecimal(juego.precio, 1, 2)}">0.00</span></p>

                <form method="post" th:action="@{/carrito/agregar}" class="mt-4">
                    <input type="hidden" name="id" th:value="${juego.idJuegos}">
                    
                    <label class="form-label"><strong>Cantidad</strong></label>
                    <input name="cantidad" type="number" class="form-control w-25 mb-3" value="1" min="1">
                    
                    <button type="submit" class="btn btn-primary btn-lg">Agregar al carrito</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
