<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirmar Compra - MundoGamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/css/admin.css}">
	<link rel="stylesheet" th:href="@{/css/carrito.css}">
</head>
<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="carrito-container shadow-lg">
                    
                    <div class="text-center py-3 mb-4">
                        <h2 class="fw-bold text-uppercase"> Confirmar Compra </h2>
                        <hr style="border-color: var(--color-acento-principal); opacity: 0.5;">
                    </div>
                    
                    <div class="p-3 text-center">
                        <p class="fs-5 mb-4">¿Estás seguro de que deseas procesar tu orden en <span class="fw-bold texto-acento">MundoGamer</span>?</p>
                        
                        <div class="p-4 mb-5 rounded" style="background-color: rgba(0, 0, 0, 0.2); border: 1px dashed var(--color-acento-principal);">
                            <h4 class="mb-0">Total a pagar:</h4>
                            <span class="fs-1 fw-bold texto-acento">
                                S/. <span th:text="${#numbers.formatDecimal(total, 1, 2)}"></span>
                            </span>
                        </div>

                        <form th:action="@{/carrito/finalizar}" method="post" class="d-grid gap-3 col-md-10 mx-auto">
                            <button type="submit" class="btn btn-pagar btn-lg fw-bold border-0 py-3">
                                <i class="bi bi-credit-card-2-back-fill me-2"></i> Confirmar y Pagar
                            </button>
                            
                            <a th:href="@{/carrito/ver}" class="btn btn-cancelar py-2">
                                <i class="bi bi-arrow-left me-2"></i> Regresar al Carrito
                            </a>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

</body>
</html>
