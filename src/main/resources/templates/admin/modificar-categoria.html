<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Categoría</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>

<div class="d-flex" style="min-height: 100vh;">

    <div class="flex-grow-1 p-4 w-100">
        <div class="container" style="max-width: 700px;">
            
            <div class="mb-4">
                <h2 class="mb-0">Editar Categoría</h2>
            </div>

            <div class="card card-admin p-4 shadow-lg">
                <form th:action="@{/admin/modificar-categoria}" th:object="${categoria}" method="post">
                    
                    <div class="mb-3">
                        <label class="form-label">ID Categoría</label>
                        <input type="text" class="form-control" th:field="*{idCategoria}" placeholder="Generado automáticamente" readonly>
                        <small class="text-muted">El código se genera o asigna por el sistema.</small>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Descripción</label>
                        <input type="text" class="form-control" th:field="*{descripcion}" required>
                    </div>

					<hr class="border-secondary mb-4">

                    <div class="d-flex justify-content-end">
                        <a th:href="@{/admin/lista-categorias}" class="btn btn-outline-light me-2">Cancelar</a>
                        <button type="submit" class="btn btn-success px-4">Guardar Categoría</button>
                    </div>

                </form>
            </div>

        </div>
    </div>

</div>

</body>
</html>
