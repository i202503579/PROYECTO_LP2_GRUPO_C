<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nueva Categoría - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="container mt-5">
        <div class="card card-admin p-4 shadow-lg">
            <h1 class="text-center text-white mb-4">Registrar Nueva Categoría</h1>
            <div class="row d-flex justify-content-center">
                <div class="col-md-6">
                    <form th:action="@{/admin/guardar-categoria}" th:object="${categoria}" method="post">

                        <div class="col-md-12 mb-3">
                            <label class="form-label text-white">Descripción de la Categoría</label>
                            <input type="text" class="form-control" th:field="*{descripcion}" required>
                        </div>

                        <div class="col-md-12 d-flex justify-content-between mt-4">
                            <a th:href="@{/admin/lista-categorias}" class="btn btn-outline-light">
                                <i class="fa-solid fa-reply"></i> Regresar
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i></i> Registrar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
