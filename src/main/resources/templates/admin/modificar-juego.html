<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Modificar Juego</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body>
    <div class="container mt-5">
        <div class="card card-admin p-4">
            <h1 class="text-center text-white mb-4" th:text="|Modificar Juego #${juego.idJuegos}|"></h1>
            <form th:action="@{/admin/modificar-categoria}" th:object="${juego}" method="post" enctype="multipart/form-data">
                
                <input type="hidden" th:field="*{idJuegos}" />
                <input type="hidden" th:field="*{imagen}" /> <div class="row g-3">
                    <div class="col-md-12">
                        <label class="form-label text-white">Descripción</label>
                        <input type="text" class="form-control" th:field="*{descripcion}" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-white">Categoría</label>
                        <select class="form-select" th:field="*{categoria.idCategoria}">
                            <option th:each="cat : ${categorias}" 
                                    th:value="${cat.idCategoria}" 
                                    th:text="${cat.descripcion}"></option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label text-white">Precio</label>
                        <input type="number" step="0.01" class="form-control" th:field="*{precio}" required>
                    </div>

                    <div class="col-md-12">
                        <label class="form-label text-white">Cambiar imagen (opcional)</label>
                        <input type="file" name="file" class="form-control" accept="image/*">
                        <p class="text-muted mt-2">Imagen actual: <span th:text="${juego.imagen}"></span></p>
                    </div>

                    <div class="col-md-12 d-flex justify-content-between mt-4">
                        <a th:href="@{/admin/lista-juegos}" class="btn btn-outline-light">Regresar</a>
                        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
    <th:block th:utext="${Alert}"></th:block>
</body>
</html>
