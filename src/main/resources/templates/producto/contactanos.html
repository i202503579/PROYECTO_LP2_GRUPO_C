<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contáctanos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <link rel="stylesheet" th:href="@{/css/header.css}"> 
    <link rel="stylesheet" th:href="@{/css/footer.css}">
    <link rel="stylesheet" th:href="@{/css/contacto.css}">
</head>
<body> <div th:replace="~{fragments/header :: menuPrincipal}"></div>

    <section>
        <div class="contenedor">
            <div class="marcoContacto">
                <h1 class="main-title text-center"><i></i>Contáctanos</h1>

                <div th:if="${mensajeExito != null}" class="alert alert-success text-center" role="alert" style="background-color: rgba(25, 135, 84, 0.2); border-color: #198754; color: white;">
                    <h5 class="alert-heading mb-1"><i class="bi bi-check-circle me-2"></i>¡Mensaje Recibido!</h5>
                    <p class="mb-0 small">Su consulta ha sido registrada con éxito.</p>
                </div>
                
                <div th:if="${mensajeError != null}" class="alert alert-danger text-center" role="alert" style="background-color: rgba(220, 53, 69, 0.2); border-color: #dc3545; color: white;">
                    <h5 class="alert-heading mb-1"><i class="bi bi-exclamation-triangle me-2"></i>¡Error al Enviar!</h5>
                    <p class="mb-0 small">No se pudo registrar su mensaje. Por favor, intente de nuevo.</p>
                </div>
                
                <form class="formulario" id="form-contacto" th:action="@{/contactanos}" method="post">
                    
                    <div class="row mb-3 align-items-center">
                        <div class="col-3"><label for="nombre" class="col-form-label text-end">Nombre</label></div>
						<div class="col-9">
							<input type="text" class="form-control" placeholder="ingresa tu nombre" required>
						</div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <div class="col-3"><label for="email" class="form-label">Correo</label></div>
						<div class="col-9">
                        	<input type="email" class="form-control" placeholder="correo@ejemplo.com" required>
						</div>
                    </div>

                    <div class="row mb-3 align-items-center">
                        <div class="col-3"><label for="telefono" class="form-label">Teléfono</label></div>
						<div class="col-9">
                        <input type="text" class="form-control" placeholder="Ingresa tu número" required>
						</div>
                    </div>

                    <div class="row mb-3 align-items-start">
                        <div class="col-3"><label for="mensaje" class="form-label">Mensaje</label></div>
						<div class="col-9">
                        <textarea id="mensaje" name="txtmens" class="form-control" rows="4"
                            placeholder="ingresa el mensaje (Máximo 200 caracteres)" maxlength="200" required></textarea>
						</div>
                    </div>

                    <div class="d-grid">
                        <button class="btn enviar" type="submit"><i></i>Enviar Mensaje</button>
                    </div>
                </form>
            </div>
        </div>   
    </section>
    
    <div th:replace="~{fragments/footer :: pieDePagina}"></div>
    
</body>
</html>
